# Redirect all HTTP to HTTPS (non-www)
server {
    listen 80;
    server_name nelaka.xyz www.nelaka.xyz;
    return 301 https://nelaka.xyz$request_uri;
}

# Redirect HTTPS www → non-www
server {
    listen 443 ssl http2;
    server_name www.nelaka.xyz;

    ssl_certificate     /etc/letsencrypt/live/nelaka.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nelaka.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nelaka.xyz$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name nelaka.xyz;

    ssl_certificate     /etc/letsencrypt/live/nelaka.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nelaka.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/portfolio-live;

    # ---------------------------------------------------------------
    # KEY FIX: serve Nuxt SSG pages (page/index.html) *without*
    # issuing a trailing-slash redirect first.
    # The old "index index.html" directive caused:
    #   /contact  →  301  →  /contact/  →  content
    # which Google flags as a "Redirect Error" / redirect chain.
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/index.html =404;
    }

    # Cache immutable Nuxt chunk assets for 1 year
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;
}
